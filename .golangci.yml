version: "2"

linters:
  enable:
    - errcheck
    - gofmt
    - goimports
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: dupclean

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
