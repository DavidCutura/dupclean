version: "2"

linters:
  default: none
  enable:
    - errcheck
    - gofmt
    - goimports
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    goimports:
      local-prefixes: dupclean
  exclusions:
    rules:
      - path: '(.+)_test\.go'
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true
